name: ZETUSHIN Security & Separation Audit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *' # Daily at midnight

jobs:
  audit:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm install
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Security Audit Tests
      run: npx playwright test tests/security.spec.ts
    - name: Check Domain Separation (curl)
      run: |
        echo "Checking LP Domain Separation..."
        STATUS_APP=$(curl -s -o /dev/null -w "%{http_code}" https://z-26.vercel.app/app)
        if [ "$STATUS_APP" != "404" ]; then echo "FAIL: LP /app exposed"; exit 1; fi
        
        STATUS_API=$(curl -s -o /dev/null -w "%{http_code}" https://z-26.vercel.app/api/health)
        if [ "$STATUS_API" != "404" ]; then echo "FAIL: LP /api exposed"; exit 1; fi
        
        echo "Checking APP Domain Health..."
        STATUS_HEALTH=$(curl -s -o /dev/null -w "%{http_code}" https://zetu-shin-app.vercel.app/api/health)
        if [ "$STATUS_HEALTH" != "200" ]; then echo "FAIL: APP Health down"; exit 1; fi
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
